name: Deploy Thesis and Presentation

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Compila la Tesi (LaTeX)
      - name: Compile LaTeX Thesis
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex
          args: -pdf -shell-escape -file-line-error -interaction=nonstopmode
          extra_system_packages: "py3-pygments"

      # 2. Compila la Presentazione (Typst)
      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: 'latest'
      - name: Compile Presentation
        run: typst compile presentazione.typ presentazione.pdf

      # 3. Prepara cartella pubblica unica
      - name: Prepare Public Directory
        run: |
          mkdir public
          cp thesis.pdf public/SuarAlberto.pdf
          cp presentazione.pdf public/presentazione.pdf

      # 4. Pubblica l'artefatto unico
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4