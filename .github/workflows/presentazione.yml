name: Deploy Presentation

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup ambiente Typst
      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: 'latest'

      # 2. Compilazione della Presentazione
      # Assicurati che il file si chiami 'presentazione.typ' nella root
      - name: Compile Presentation
        run: |
          mkdir -p output
          typst compile presentazione.typ output/presentazione.pdf

      # 3. Deploy su GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output